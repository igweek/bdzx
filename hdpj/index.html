<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>大闸蟹蜕壳风险预警模型</title>
  
  <!-- Pure HTML Dependencies -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    input[type=range] { accent-color: #3b82f6; }
    input[type=range]::-webkit-slider-thumb {
      appearance: none;
      width: 16px;
      height: 16px;
      background: #3b82f6;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
    }
  </style>
</head>
<body class="bg-slate-50/50 text-slate-800 min-h-screen p-4 sm:p-6 lg:p-10 selection:bg-blue-100">

  <div class="max-w-7xl mx-auto space-y-6">
    
    <!-- Header -->
    <header class="flex flex-col md:flex-row justify-between items-end gap-4 pb-4 border-b border-slate-200/60">
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">
      
      <!-- Logic Gates Column -->
      <div class="lg:col-span-4 space-y-6 flex flex-col">
        
        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200">
          <div class="flex justify-between items-center mb-6">
            <h2 class="text-base font-bold tracking-tight text-slate-800">实时判断</h2>
            <span id="dateBadge" class="text-[13px] font-semibold text-blue-700 bg-blue-50 px-3 py-1 rounded-full ring-1 ring-inset ring-blue-600/10">-</span>
          </div>
          
          <div class="space-y-3">
            <div id="rule1" class="p-3.5 rounded-lg border flex items-center justify-between transition-colors bg-white border-slate-200">
              <div>
                <div class="font-semibold text-slate-700 text-sm">进食趋势持续走低</div>
                <div class="text-[13px] text-slate-500 mt-0.5">平滑值 <span id="valI" class="font-medium text-slate-700">-</span> <span class="mx-0.5 text-slate-400">/</span> 阈值 60</div>
              </div>
              <div id="icon1" class="text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg></div>
            </div>

            <div id="rule2" class="p-3.5 rounded-lg border flex items-center justify-between transition-colors bg-white border-slate-200">
              <div>
                <div class="font-semibold text-slate-700 text-sm">活跃趋势持续降低</div>
                <div class="text-[13px] text-slate-500 mt-0.5">平滑值 <span id="valA" class="font-medium text-slate-700">-</span> <span class="mx-0.5 text-slate-400">/</span> 阈值 60</div>
              </div>
              <div id="icon2" class="text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg></div>
            </div>

            <div id="rule3" class="p-3.5 rounded-lg border flex items-center justify-between transition-colors bg-white border-slate-200">
              <div>
                <div class="font-semibold text-slate-700 text-sm">处于历史蜕壳期</div>
                <div class="text-[13px] text-slate-500 mt-0.5">判定窗口 (8/22 - 8/28)</div>
              </div>
              <div id="icon3" class="text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg></div>
            </div>

            <div id="rule4" class="p-3.5 rounded-lg border flex flex-col justify-between transition-colors bg-white border-slate-200">
              <div class="flex justify-between items-center mb-2.5">
                <div class="font-semibold text-slate-700 text-sm">环境数据无异常</div>
                <div id="icon4" class="text-slate-300"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 12H4"></path></svg></div>
              </div>
              <div class="text-[13px] flex items-center gap-3" id="envContainer">
                <!-- Env Data Injected Here -->
              </div>
            </div>
          </div>

          <div id="finalBoard" class="mt-6 p-4 rounded-lg border text-center transition-all duration-300">
             <h3 id="finalTitle" class="font-bold text-lg tracking-tight">-</h3>
             <p id="finalDesc" class="text-sm mt-1.5 font-medium">-</p>
          </div>

          <button id="playBtn" onclick="togglePlay()" class="w-full mt-6 py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-all bg-slate-900 text-white hover:bg-slate-800 shadow-sm">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <span id="playBtnText">按日推演数据</span>
          </button>
        </div>

        <div class="bg-white rounded-xl p-6 shadow-sm border border-slate-200 relative">
          <div class="flex justify-between items-center mb-5">
            <h3 class="font-bold text-slate-800 text-sm flex items-center gap-2">
               <svg class="w-4 h-4 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
               滑动平均时间窗
            </h3>
            
            <button onclick="resetData()" title="重新生成随机数据" class="p-2 -mr-2 -mt-2 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-full transition-colors flex items-center justify-center">
              <svg class="w-4 h-4" transform="scale(-1 1)" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
            </button>
          </div>
          
          <div class="flex justify-between items-center mb-3">
            <span class="text-blue-700 font-medium bg-blue-50 px-2.5 py-1 rounded text-[13px] ring-1 ring-inset ring-blue-600/10">滑动窗: <span id="maText" class="font-bold">3</span> 天</span>
          </div>
          <input type="range" min="1" max="7" value="3" oninput="updateMA(this.value)" class="w-full cursor-pointer h-1.5 bg-slate-100 rounded-lg appearance-none">
          <div class="flex justify-between text-[11px] text-slate-400 font-medium mt-2 px-1">
            <span>灵敏 (1天)</span>
            <span>平滑 (7天)</span>
          </div>
        </div>
      </div>

      <!-- Chart Column -->
      <div class="lg:col-span-8 bg-white rounded-xl p-6 shadow-sm border border-slate-200 flex flex-col min-h-[550px]">
        <div class="relative w-full flex-1 mt-2">
           <canvas id="mainChart"></canvas>
        </div>
      </div>

    </div>
  </div>

  <script>
    // System State
    let rawData = [];
    let processedData = [];
    let maWindow = 3;
    let currentIndex = 0;
    let isPlaying = false;
    let playTimer = null;
    let chartInstance = null;
    const THRESHOLD = 60;

    // Generators
    function generateData() {
      const data = [];
      const startDay = new Date(2024, 7, 15);
      for(let i=0; i<20; i++) {
        const d = new Date(startDay.getFullYear(), startDay.getMonth(), startDay.getDate() + i);
        const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
        
        let bI = 95, bA = 90;
        if(i >= 6 && i <= 13) {
          const dist = Math.abs(9 - i);
          const drop = 50 - dist * 10;
          bI -= drop;
          bA -= (drop + 15);
        }

        data.push({
          date: dateStr,
          isMoltingWindow: (d.getMonth()===7 && d.getDate()>=22 && d.getDate()<=28),
          rawIntake: Math.max(5, Math.round(bI + (Math.random()*30-15))),
          rawActivity: Math.max(5, Math.round(bA + (Math.random()*30-15))),
          envDO: +(6.8 + (Math.random()*0.4 - 0.2)).toFixed(1),
          envPH: +(8.0 + (Math.random()*0.2 - 0.1)).toFixed(1),
          envTemp: +(25.0 + (Math.random()*1.5 - 0.75)).toFixed(1),
        });
      }
      return data;
    }

    function computeData() {
      processedData = rawData.map((d, i) => {
        let sumI = 0, sumA = 0, count = 0;
        for(let j=0; j<maWindow; j++) {
          if(i-j >= 0) {
            sumI += rawData[i-j].rawIntake;
            sumA += rawData[i-j].rawActivity;
            count++;
          }
        }
        const maI = Math.round(sumI / count);
        const maA = Math.round(sumA / count);
        const envNormal = d.envDO >= 5.0 && d.envPH >= 7.5 && d.envPH <= 8.5 && d.envTemp >= 20 && d.envTemp <= 28;

        return {
          ...d,
          maIntake: maI,
          maActivity: maA,
          ruleI: maI < THRESHOLD,
          ruleA: maA < THRESHOLD,
          ruleM: d.isMoltingWindow,
          ruleE: envNormal,
          warning: (maI < THRESHOLD) && (maA < THRESHOLD) && d.isMoltingWindow && envNormal,
          crisis: !envNormal
        }
      });
    }

    // UI Updates
    function updateDOM() {
      const p = processedData[currentIndex];
      if(!p) return;

      document.getElementById('dateBadge').innerText = `当前：${p.date}`;
      document.getElementById('valI').innerText = p.maIntake;
      document.getElementById('valA').innerText = p.maActivity;

      // Env Text Styling
      const colorTemp = (p.envTemp<20||p.envTemp>28) ? 'text-rose-600 font-bold' : 'text-slate-600 font-medium';
      const colorDO = (p.envDO<5.0) ? 'text-rose-600 font-bold' : 'text-slate-600 font-medium';
      const colorPH = (p.envPH<7.5||p.envPH>8.5) ? 'text-rose-600 font-bold' : 'text-slate-600 font-medium';
      document.getElementById('envContainer').innerHTML = `
        <span class="${colorTemp}">水温: ${p.envTemp}°C</span>
        <span class="${colorDO}">溶氧: ${p.envDO}</span>
        <span class="${colorPH}">pH: ${p.envPH}</span>
      `;

      // Helper for Rule Box styles
      const iconCheck = `<svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path></svg>`;
      const iconCross = `<svg class="w-5 h-5 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;
      const iconWarn = `<svg class="w-5 h-5 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`;

      const setRule = (id, valid, activeClass) => {
        const el = document.getElementById('rule'+id);
        const icon = document.getElementById('icon'+id);
        if(valid) {
          el.className = `p-3.5 rounded-lg border flex items-center justify-between transition-colors ${activeClass}`;
          icon.innerHTML = iconCheck;
        } else {
          el.className = 'p-3.5 rounded-lg border flex items-center justify-between transition-colors bg-white border-slate-200';
          icon.innerHTML = iconCross;
        }
      }

      setRule(1, p.ruleI, 'bg-emerald-50/50 border-emerald-200');
      setRule(2, p.ruleA, 'bg-emerald-50/50 border-emerald-200');
      setRule(3, p.ruleM, 'bg-emerald-50/50 border-emerald-200');
      
      const el4 = document.getElementById('rule4');
      if(p.ruleE) {
        el4.className = 'p-3.5 rounded-lg border flex flex-col justify-between transition-colors bg-emerald-50/50 border-emerald-200';
        document.getElementById('icon4').innerHTML = iconCheck;
      } else {
        el4.className = 'p-3.5 rounded-lg border flex flex-col justify-between transition-colors bg-white border-rose-200';
        document.getElementById('icon4').innerHTML = iconWarn;
      }

      // Final Board
      const b = document.getElementById('finalBoard');
      const t = document.getElementById('finalTitle');
      const d = document.getElementById('finalDesc');

      if(p.warning) {
        b.className = 'mt-6 p-4 rounded-lg border text-center transition-all bg-white border-rose-500 shadow-sm';
        t.innerHTML = `<span class="flex items-center justify-center gap-2">${iconWarn} 疑似进入蜕壳期</span>`;
        t.className = 'font-bold text-lg text-rose-600 tracking-tight';
        d.innerHTML = '综合判定成立，风险较高，建议加强巡视。';
        d.className = 'text-[13px] mt-1.5 text-slate-600 font-medium';
      } else if (p.crisis) {
        b.className = 'mt-6 p-4 rounded-lg border text-center transition-all bg-white border-amber-500 shadow-sm';
        t.innerHTML = `<span class="flex items-center justify-center gap-2"><svg class="w-5 h-5 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg> 水质环境异常</span>`;
        t.className = 'font-bold text-lg text-amber-600 tracking-tight';
        d.innerHTML = '环境指标越界，需重点关注并调控。';
        d.className = 'text-[13px] mt-1.5 text-slate-600 font-medium';
      } else {
        b.className = 'mt-6 p-4 rounded-lg border text-center transition-all bg-white border-emerald-500 shadow-sm';
        t.innerHTML = `<span class="flex items-center justify-center gap-2">${iconCheck} 塘口状态平稳</span>`;
        t.className = 'font-bold text-lg text-emerald-600 tracking-tight';
        d.innerHTML = '未达到综合预警触发条件。';
        d.className = 'text-[13px] mt-1.5 text-slate-600 font-medium';
      }
    }

    function renderChart() {
      const ctx = document.getElementById('mainChart').getContext('2d');
      if(chartInstance) chartInstance.destroy();

      const labels = processedData.map(d => d.date);
      const visibleData = processedData.map((d, i) => i <= currentIndex ? d : {});

      // Custom Plugin to draw historical window background
      const areaPlugin = {
        id: 'historicalArea',
        beforeDraw: (chart) => {
          const {ctx, chartArea, scales} = chart;
          if(!chartArea) return;
          ctx.save();
          ctx.fillStyle = 'rgba(254, 243, 199, 0.4)'; // amber-100
          // 8/22 is index 7, 8/28 is index 13
          const left = scales.x.getPixelForTick(7);
          const right = scales.x.getPixelForTick(13);
          ctx.fillRect(left, chartArea.top, right - left, chartArea.bottom - chartArea.top);
          
          // 绘制文字：放在黄色块内最上方
          const yPos = chartArea.top + 24;
          const px = left + (right - left) / 2;
          const text = '历史蜕壳日历窗 (8/22 - 8/28)';
          
          ctx.font = '600 12px system-ui, sans-serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'middle';
          const textWidth = ctx.measureText(text).width;
          
          // 绘制半透明背景小标签
          ctx.fillStyle = 'rgba(253, 230, 138, 0.6)'; // amber-200
          if(ctx.roundRect) {
            ctx.beginPath();
            ctx.roundRect(px - textWidth/2 - 8, yPos - 12, textWidth + 16, 24, 6);
            ctx.fill();
          } else {
            ctx.fillRect(px - textWidth/2 - 8, yPos - 12, textWidth + 16, 24);
          }
          
          // 绘制文字内容
          ctx.fillStyle = '#b45309'; // amber-700
          ctx.fillText(text, px, yPos);
          ctx.restore();
        }
      };

      chartInstance = new Chart(ctx, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [
            {
              type: 'line', label: '进食连续趋势',
              data: visibleData.map(d => d.maIntake),
              borderColor: '#16a34a', borderWidth: 3, tension: 0.3, pointBackgroundColor: 'white', pointBorderWidth: 2, order: 1
            },
            {
              type: 'line', label: '活跃连续趋势',
              data: visibleData.map(d => d.maActivity),
              borderColor: '#2563eb', borderWidth: 3, tension: 0.3, pointBackgroundColor: 'white', pointBorderWidth: 2, order: 2
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          animation: { duration: 0 },
          scales: {
            y: { beginAtZero: true, max: 140, grid: { color: '#f8fafc' } },
            x: { grid: { display: false } }
          },
          plugins: {
            legend: { position: 'top', labels: { usePointStyle: true, boxWidth: 8 } },
            tooltip: { mode: 'index', intersect: false },
            annotation: {
              annotations: {
                thresholdLine: {
                  type: 'line',
                  yMin: THRESHOLD,
                  yMax: THRESHOLD,
                  borderColor: 'rgba(251, 191, 36, 0.8)',
                  borderWidth: 2,
                  borderDash: [5, 5]
                }
              }
            }
          }
        },
        plugins: [areaPlugin]
      });
    }

    // Handlers
    function updateMA(val) {
      maWindow = parseInt(val);
      document.getElementById('maText').innerText = val;
      computeData();
      updateDOM();
      renderChart();
    }

    function togglePlay() {
      isPlaying = !isPlaying;
      const btn = document.getElementById('playBtn');
      const btnText = document.getElementById('playBtnText');
      if(isPlaying) {
        btnText.innerHTML = '暂停推演';
        btn.className = 'w-full mt-6 py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-all bg-slate-100 text-slate-800 hover:bg-slate-200 shadow-sm border border-slate-200';
        playTimer = setInterval(() => {
          if(currentIndex >= 19) {
            togglePlay();
          } else {
            currentIndex++;
            updateDOM();
            renderChart();
          }
        }, 1000);
      } else {
        btnText.innerHTML = '按日动态推演';
        btn.className = 'w-full mt-6 py-3 rounded-lg font-semibold flex items-center justify-center gap-2 transition-all bg-slate-900 text-white hover:bg-slate-800 shadow-sm';
        clearInterval(playTimer);
      }
    }

    function resetData() {
      if(isPlaying) togglePlay();
      rawData = generateData();
      currentIndex = 0;
      computeData();
      updateDOM();
      renderChart();
    }

    // Init
    window.onload = resetData;
  </script>
</body>
</html>
